services:
  - type: web
    name: cdp-backend
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cdp-postgres
          property: connectionString
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CDP_SERVICE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
databases:
  - name: cdp-postgres
    plan: free
